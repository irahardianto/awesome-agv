name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC Trusted Publishing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          # NOTE: Do NOT set registry-url here. It creates an .npmrc with
          # _authToken=${NODE_AUTH_TOKEN} which conflicts with OIDC auth.
          # npm defaults to registry.npmjs.org.

      - name: Upgrade npm to latest (>=11.5.1 required for Trusted Publishing)
        run: npm install -g npm@latest

      - name: Verify npm version
        run: npm --version

      - name: Set version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Setting version to $VERSION"
          npm version $VERSION --no-git-tag-version
        working-directory: ./cli

      - name: Copy README for npm package
        run: cp README.md cli/README.md

      - name: Publish to npm (Trusted Publishing via OIDC)
        run: npm publish --provenance --access public
        working-directory: ./cli
